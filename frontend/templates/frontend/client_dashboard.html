{% extends "frontend/base.html" %}
{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    --bg:        #f0f4ff;
    --surface:   #ffffff;
    --surface2:  #e8edf8;
    --border:    #dde3f0;
    --accent:    #4f46e5;
    --accent-lt: #eef2ff;
    --success:   #10b981;
    --warning:   #f59e0b;
    --danger:    #ef4444;
    --info:      #0ea5e9;
    --text:      #1e293b;
    --muted:     #94a3b8;
    --radius:    16px;
    --radius-sm: 10px;
    --shadow:    0 4px 24px rgba(79,70,229,0.07);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  .dash {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ── HEADER ── */
  .dash-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 24px;
  }

  .dash-title {
    font-size: clamp(20px, 3.5vw, 26px);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  .dash-title small {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  /* ── LIVE BADGE ── */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #d1fae5;
    color: #065f46;
    border: 1px solid #a7f3d0;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  /* ── FILTER PILLS ── */
  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .filter-btn {
    display: inline-flex;
    align-items: center;
    padding: 7px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
    transition: all 0.18s ease;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-lt);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(79,70,229,0.25);
  }

  /* ── KPI GRID ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    transition: transform 0.18s, box-shadow 0.18s;
  }

  .kpi-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 32px rgba(79,70,229,0.12);
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 2px 2px 0 0;
  }

  .kpi-card.total::before   { background: var(--accent); }
  .kpi-card.approved::before{ background: var(--success); }
  .kpi-card.pending::before { background: var(--warning); }
  .kpi-card.rejected::before{ background: var(--danger); }

  .kpi-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    margin-bottom: 12px;
  }

  .kpi-card.total    .kpi-icon { background: var(--accent-lt); }
  .kpi-card.approved .kpi-icon { background: #d1fae5; }
  .kpi-card.pending  .kpi-icon { background: #fef3c7; }
  .kpi-card.rejected .kpi-icon { background: #fee2e2; }

  .kpi-value {
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
    transition: all 0.3s;
  }

  .kpi-card.total    .kpi-value { color: var(--accent); }
  .kpi-card.approved .kpi-value { color: #065f46; }
  .kpi-card.pending  .kpi-value { color: #92400e; }
  .kpi-card.rejected .kpi-value { color: #991b1b; }

  .kpi-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  /* ── CHART + TABLE CARDS ── */
  .card-ui {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .card-header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .card-header-bar h5 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-header-bar h5 .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .card-body-pad { padding: 22px; }

  /* ── TABLE ── */
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 480px;
  }

  thead th {
    background: var(--surface2);
    border-bottom: 1.5px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 700;
    padding: 12px 18px;
    text-align: left;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.13s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8f9ff; }

  tbody td {
    padding: 13px 18px;
    font-size: 13.5px;
    vertical-align: middle;
    color: var(--text);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 11px;
    border-radius: 100px;
    font-size: 11.5px;
    font-weight: 600;
    text-transform: capitalize;
  }

  .badge::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
  }

  .bg-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
  .bg-success::before { background: var(--success); }
  .bg-warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
  .bg-warning::before { background: var(--warning); animation: pulse 2s infinite; }
  .bg-danger  { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .bg-danger::before  { background: var(--danger); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .dash { padding: 18px 14px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  }

  @media (max-width: 420px) {
    .kpi-value { font-size: 24px; }
  }
</style>

<div class="dash">

  <!-- HEADER -->
  <div class="dash-header">
    <div class="dash-title">
      <small>Client View</small>
      📊 Client Dashboard
    </div>
    <span class="live-badge">
      <span class="live-dot"></span>
      Live · Auto-refresh 5s
    </span>
  </div>

  <!-- FILTER PILLS -->
  <div class="filter-group">
    <button class="filter-btn active" onclick="filterData('all', this)">All</button>
    <button class="filter-btn" onclick="filterData('today', this)">Today</button>
    <button class="filter-btn" onclick="filterData('week', this)">Week</button>
    <button class="filter-btn" onclick="filterData('month', this)">Month</button>
  </div>

  <!-- KPI CARDS -->
  <div class="kpi-grid">
    <div class="kpi-card total">
      <div class="kpi-icon">📁</div>
      <div class="kpi-value" id="totalTasks">0</div>
      <div class="kpi-label">Total Tasks</div>
    </div>
    <div class="kpi-card approved">
      <div class="kpi-icon">✅</div>
      <div class="kpi-value" id="approvedTasks">0</div>
      <div class="kpi-label">Approved</div>
    </div>
    <div class="kpi-card pending">
      <div class="kpi-icon">⏳</div>
      <div class="kpi-value" id="pendingTasks">0</div>
      <div class="kpi-label">Pending</div>
    </div>
    <div class="kpi-card rejected">
      <div class="kpi-icon">❌</div>
      <div class="kpi-value" id="rejectedTasks">0</div>
      <div class="kpi-label">Rejected</div>
    </div>
  </div>

  <!-- CHART -->
  <div class="card-ui">
    <div class="card-header-bar">
      <h5><span class="dot"></span> Activity Trend</h5>
    </div>
    <div class="card-body-pad">
      <canvas id="chart"></canvas>
    </div>
  </div>


  <!-- TABLE -->
<div class="card-ui">
  <div class="card-header-bar">
    <h5>
      <span class="dot" style="background:var(--info)"></span>
      Task Activity
    </h5>
  </div>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>Project</th>
          <th>Task</th>
          <th>Proof</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>

      <!-- ✅ IMPORTANT: NO DJANGO LOOP -->
      <tbody id="taskTable">
        <tr>
          <td colspan="5" class="empty-state">
            ⏳ Loading data...
          </td>
        </tr>
      </tbody>
    </table>

    <!-- ✅ PAGINATION (JS controlled) -->
    <div id="pagination" style="margin-top:15px;"></div>

  </div>
</div>

  
<script>
let chartInstance = null;
let currentPage = 1;
let currentType = "all";
let lastTotal = 0;
let servicesLoaded = false;

// 🔹 GET FILTER VALUES (SAFE)
function getFilters(){
    return {
        type: currentType,
        page: currentPage,
        limit: 10,
        search: document.getElementById("searchInput")?.value || "",
        service: document.getElementById("serviceFilter")?.value || "",
        start_date: document.getElementById("startDate")?.value || "",
        end_date: document.getElementById("endDate")?.value || "",
        order: document.getElementById("orderFilter")?.value || "-date"
    };
}

// 🔹 BUILD QUERY
function buildQuery(params){
    return Object.keys(params)
        .filter(k => params[k])
        .map(k => `${k}=${encodeURIComponent(params[k])}`)
        .join("&");
}

// 🔥 MAIN LOAD
function loadDashboard(){
    const query = buildQuery(getFilters());

    fetch(`/activities/api/dashboard/?${query}`)
    .then(res => res.json())
    .then(data => {

        updateKPI(data.kpi);
        updateTable(data.table);
        updateChart(data.chart.labels, data.chart.data);
        updatePagination(data.pagination);

        // ✅ Load services once
        if(!servicesLoaded && data.services){
            populateServices(data.services);
            servicesLoaded = true;
        }

        lastTotal = data.kpi.total;
    });
}

// 🔥 KPI
function updateKPI(kpi){
    document.getElementById("totalTasks").innerText = kpi.total;
    document.getElementById("approvedTasks").innerText = kpi.approved;
    document.getElementById("pendingTasks").innerText = kpi.pending;
    document.getElementById("rejectedTasks").innerText = kpi.rejected;
}

// 🔥 TABLE
function updateTable(rows){
    let table = document.getElementById("taskTable");
    table.innerHTML = "";

    if(!rows.length){
        table.innerHTML = `<tr><td colspan="5" class="empty-state">📋 No activity data</td></tr>`;
        return;
    }

    rows.forEach(r => {
        const badgeCls =
            r.status === 'approved' ? 'bg-success' :
            r.status === 'pending' ? 'bg-warning' :
            'bg-danger';

        let proofHTML = 'No proof';

        if(r.proof_link){
            proofHTML = r.proof_link
                .split('\n')
                .filter(l => l.trim())
                .map((l,i)=>`<a href="${l}" target="_blank" style="display:block;color:#4f46e5;text-decoration:underline;">Proof ${i+1}</a>`)
                .join('');
        }

        table.innerHTML += `
            <tr>
                <td><strong>${r.project__name}</strong></td>
                <td>${r.task_title}</td>
                <td>${proofHTML}</td>
                <td><span class="badge ${badgeCls}">${r.status}</span></td>
                <td style="color:var(--muted)">${r.date}</td>
            </tr>`;
    });
}

// 🔥 CHART
function updateChart(labels, data){
    if(chartInstance) chartInstance.destroy();

    chartInstance = new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
            labels: labels.length ? labels : ["No Data"],
            datasets: [{
                label: "Tasks",
                data: data.length ? data : [0],
                borderColor: '#4f46e5',
                backgroundColor: 'rgba(79,70,229,0.08)',
                borderWidth: 2,
                tension: 0.4,
                fill: true
            }]
        }
    });
}

function updatePagination(p){
    const container = document.getElementById("pagination");
    if(!container) return;

    container.innerHTML = "";

    const current = p.page;
    const total = p.pages;

    if(total <= 1) return;

    // 🔹 PREV BUTTON
    if(current > 1){
        container.innerHTML += `
            <button onclick="goToPage(${current - 1})" class="filter-btn">
                ◀ Prev
            </button>`;
    }

    // 🔹 SMART RANGE (only show nearby pages)
    let start = Math.max(1, current - 2);
    let end = Math.min(total, current + 2);

    // 🔹 FIRST + DOTS
    if(start > 1){
        container.innerHTML += `
            <button onclick="goToPage(1)" class="filter-btn">1</button>
            <span style="padding:6px;">...</span>
        `;
    }

    // 🔹 PAGE NUMBERS
    for(let i = start; i <= end; i++){
        container.innerHTML += `
            <button onclick="goToPage(${i})"
                class="filter-btn"
                style="${i===current?'background:#4f46e5;color:#fff':''}">
                ${i}
            </button>`;
    }

    // 🔹 LAST + DOTS
    if(end < total){
        container.innerHTML += `
            <span style="padding:6px;">...</span>
            <button onclick="goToPage(${total})" class="filter-btn">${total}</button>
        `;
    }

    // 🔹 NEXT BUTTON
    if(current < total){
        container.innerHTML += `
            <button onclick="goToPage(${current + 1})" class="filter-btn">
                Next ▶
            </button>`;
    }
}

function goToPage(page){
    currentPage = page;
    loadDashboard();
}

// 🔥 SERVICES (DYNAMIC)
function populateServices(services){
    const select = document.getElementById("serviceFilter");
    if(!select) return;

    select.innerHTML = `<option value="">All Services</option>`;

    services.forEach(s => {
        select.innerHTML += `<option value="${s}">${s}</option>`;
    });
}

// 🔥 FILTER BUTTONS
function filterData(type, btn){
    currentType = type;
    currentPage = 1;

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');

    loadDashboard();
}

// 🔥 APPLY FILTERS
function applyFilters(){
    currentPage = 1;
    loadDashboard();
}

// 🔥 SEARCH (SAFE)
document.addEventListener("DOMContentLoaded", () => {
    const search = document.getElementById("searchInput");
    if(search){
        search.addEventListener("input", () => {
            currentPage = 1;
            loadDashboard();
        });
    }
});

// 🔥 SMART REFRESH (OPTIMIZED)
setInterval(() => {
    fetch(`/activities/api/dashboard/`)
    .then(res => res.json())
    .then(data => {
        if(data.kpi.total !== lastTotal){
            loadDashboard();
        }
    });
}, 5000);

// 🔥 INITIAL LOAD
window.onload = () => loadDashboard();

</script>


{% endblock %}
