{% extends "frontend/base.html" %}
{% block content %}

{% load static %}

<link rel="stylesheet" href="{% static 'css/daily.css' %}">
<div class="container-fluid">
<div class="row">

<div class="col-lg-3">

<div class="card card-soft p-3">

<div class="section-title">
Projects
</div>
<div
    class="project-item project-active"
    onclick="clearProject(this)">

    All Projects

</div>

{% for p in projects %}


<div
    class="project-item"
    onclick="selectProject({{p.id}}, this)">

    {{p.name}}

</div>

{% endfor %}

</div>

</div>

<!-- RIGHT -->
<div class="col-lg-9">

<!-- FILTER -->
<div class="card card-soft p-3 mb-3">

<div class="row g-2 align-items-end">

<div class="col-md-3">
<label>Filter</label>

<select
    id="filterType"
    class="form-control"
    onchange="handleFilterChange()">

    <option value="today">Today</option>
    <option value="week">Last Week</option>
    <option value="month">Last Month</option>
    <option value="custom">Custom</option>

</select>
</div>

<div
    class="col-md-2"
    id="startBox"
    style="display:none;">

<label>Start</label>

<input
    type="date"
    id="startDate"
    class="form-control">

</div>

<div
    class="col-md-2"
    id="endBox"
    style="display:none;">

<label>End</label>

<input
    type="date"
    id="endDate"
    class="form-control">

</div>

<div class="col-md-2">

<button
    class="btn btn-primary w-100"
    onclick="loadData()">

    Apply

</button>

</div>

<div class="col-md-2">

<button
    class="btn btn-success w-100"
    onclick="downloadExcel()">

    Excel

</button>

</div>

</div>
</div>

<!-- CATEGORIES -->
<div class="card card-soft p-3 mb-3">

<div class="section-title">
Categories
</div>

<div id="categoriesContainer"></div>

</div>

<!-- SERVICES -->
<div class="card card-soft p-3 mb-3">

<div class="section-title">
Services
</div>

<div id="servicesContainer"></div>

</div>

<!-- TASK -->
<div class="card card-soft p-3 mb-3">

<div class="section-title">
Task Type
</div>

<div id="taskTypes"></div>

</div>

<!-- FORM -->
<div class="card card-soft p-3 mb-3">

<div class="section-title">
Fill Details
</div>

<form id="dynamicForm"></form>

</div>

<!-- TABLE — placed AFTER form -->
<div class="card card-soft p-3 mb-3">

<div class="section-title">
Saved Data
</div>

<div class="table-scroll-wrapper">

<table class="table table-bordered table-hover mb-0">

<thead>
<tr id="tableHead"></tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div
    id="paginationContainer"
    class="d-flex justify-content-center mt-3 flex-wrap gap-1">
</div>

</div>

</div>
</div>
</div>

<script src="{% static 'js/daily.js' %}"></script>

{% endblock %}
