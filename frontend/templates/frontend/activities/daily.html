{% extends "frontend/base.html" %}
{% block content %}

<div class="container-fluid">

<div class="card p-4 shadow-sm">

<!-- ASSIGNED WORK -->
<div class="card mb-3 shadow-sm">
    <div class="card-body">
        <h6 class="fw-bold mb-3">📌 Your Assigned Work</h6>
        <div id="assignedWork"></div>
    </div>
</div>

<div class="d-flex justify-content-between mb-3">
    <h5>Daily Activity Sheet</h5>

    <div class="d-flex gap-2">
        <input type="date" id="date" class="form-control">
        <button class="btn btn-primary" onclick="downloadExcel()">Excel</button>
        <button class="btn btn-dark" onclick="addRow()">+ Add</button>
    </div>
</div>

<table class="table table-hover align-middle">

<thead class="table-light">
<tr>
    <th>Project</th>
    <th>Service</th>
    <th>Task_Title</th>
    <th>Keyword</th>
    <th>Completed Work</th>
    <th>Proof Link</th>
    <th>Remarks</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>
<button class="btn btn-dark" onclick="addRow()">+ Add</button>

</div>
</div>

<script>

const API = "/activities/api/";
const csrf = document.cookie.split('; ').find(r=>r.startsWith('csrftoken')).split('=')[1];


function createRow(data = {}) {

return `
<tr>

<td>
<select class="project" onchange="loadServices(this)">
<option value="">Select</option>
{% for p in projects %}
<option value="{{p.id}}" ${data.project == {{p.id}} ? 'selected':''}>
{{p.name}}
</option>
{% endfor %}
</select>
</td>

<td>
<select class="service"></select>
</td>

<td><input class="task_title form-control" value="${data.task_title || ''}"></td>
<td><input class="keyword form-control" value="${data.keyword || ''}"></td>
<td><input class="completed form-control" value="${data.completed_work || ''}"></td>

<td>
    <div class="proof-container">
        ${
            data.proof_links?.length
            ? data.proof_links.map(link => `
                <div class="d-flex mb-1">
                    <input class="proof form-control me-1" value="${link}">
                    <button type="button" class="btn btn-sm btn-danger" onclick="removeProof(this)">✕</button>
                </div>
            `).join("")
            : `
                <div class="d-flex mb-1">
                    <input class="proof form-control me-1">
                    <button type="button" class="btn btn-sm btn-danger" onclick="removeProof(this)">✕</button>
                </div>
            `
        }
    </div>
    <button type="button" class="btn btn-sm btn-outline-secondary mt-1" onclick="addProof(this)">+ Add</button>
</td>

<td><input class="remarks form-control" value="${data.remarks || ''}"></td>

<td>
<button class="btn btn-success btn-sm" onclick="saveRow(this)">💾</button>
</td>

</tr>
`;
}


// ==============================
// ADD PROOF
// ==============================
function addProof(btn){
    let container = btn.closest("td").querySelector(".proof-container");

    let div = document.createElement("div");
    div.className = "d-flex mb-1";

    div.innerHTML = `
        <input class="proof form-control me-1">
        <button type="button" class="btn btn-sm btn-danger" onclick="removeProof(this)">✕</button>
    `;

    container.appendChild(div);
}


// ==============================
// REMOVE PROOF
// ==============================
function removeProof(btn){
    btn.parentElement.remove();
}


// ==============================
// LOAD DATA
// ==============================
async function loadData() {

let date = document.getElementById("date").value;

let res = await fetch(`${API}today/?date=${date}`);
let data = await res.json();

let body = document.getElementById("tableBody");
body.innerHTML = "";

if (data.length === 0) {
    addRow();
} else {

    data.forEach(d => {

        let row = document.createElement("tr");

        row.dataset.id = d.id;
        row.dataset.service = d.service;

        row.innerHTML = createRow(d);

        body.appendChild(row);
    });

    document.querySelectorAll(".project").forEach(el => loadServices(el));
}
}


// ==============================
// LOAD SERVICES
// ==============================
async function loadServices(select) {

let projectId = select.value;
let row = select.closest("tr");
let dropdown = row.querySelector(".service");

let selectedService = row.dataset.service;

let res = await fetch(`/activities/api/project-services/${projectId}/`);
let data = await res.json();

dropdown.innerHTML = '<option value="">Select</option>';

data.forEach(s => {
    let selected = (selectedService == s.id) ? "selected" : "";
    dropdown.innerHTML += `<option value="${s.id}" ${selected}>${s.name}</option>`;
});
}


// ==============================
// ADD ROW
// ==============================
function addRow() {

let body = document.getElementById("tableBody");

let row = document.createElement("tr");
row.innerHTML = createRow();

body.appendChild(row);
}


// ==============================
// SAVE ROW
// ==============================
async function saveRow(btn) {

let row = btn.closest("tr");

let project = row.querySelector(".project").value;
let service = row.querySelector(".service").value;

if (!project) return alert("Select Project");
if (!service) return alert("Select Service");

// 🔥 MULTIPLE PROOF LINKS
let proofs = Array.from(row.querySelectorAll(".proof"))
    .map(p => p.value)
    .filter(v => v.trim() !== "");

let payload = {
    id: row.dataset.id || null,
    date: document.getElementById("date").value,
    project: project,
    service: service,
    task_title: row.querySelector(".task_title").value,
    keyword: row.querySelector(".keyword").value,
    completed_work: row.querySelector(".completed").value,
    proof_links: proofs,
    remarks: row.querySelector(".remarks").value
};

let res = await fetch(`${API}upsert/`, {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrf
    },
    body: JSON.stringify(payload)
});

let result = await res.json();

row.dataset.id = result.id;
row.dataset.service = payload.service;

btn.innerText = "✔";
btn.classList.remove("btn-success");
btn.classList.add("btn-primary");
}


// ==============================
// EXCEL DOWNLOAD
// ==============================
function downloadExcel() {
let date = document.getElementById("date").value;
window.location.href = `${API}export/?date=${date}`;
}


// ==============================
// INIT
// ==============================
document.addEventListener("DOMContentLoaded", () => {

let today = new Date().toISOString().split("T")[0];
document.getElementById("date").value = today;

loadData();
loadAssignedWork();

});

document.getElementById("date").addEventListener("change", loadData)

async function loadAssignedWork(){

    let res = await fetch(`/activities/api/assigned_work/`);
    let data = await res.json();

    console.log("Assigned Work:", data);

    let container = document.getElementById("assignedWork");
    container.innerHTML = "";

    // 🔥 HANDLE BOTH ARRAY & OBJECT
    if(!data || (Array.isArray(data) && data.length === 0) || Object.keys(data).length === 0){
        container.innerHTML = `<span class="text-muted">No assigned work</span>`;
        return;
    }

    // 🔥 CONVERT TO ARRAY SAFELY
    let projects = Array.isArray(data) ? data : Object.values(data);

    projects.forEach(project => {

        let div = document.createElement("div");
        div.className = "mb-2";

        let badges = project.services.map(s =>
            `<span class="badge bg-success me-1">${s.name}</span>`
        ).join("");

        div.innerHTML = `
            <strong>${project.project_name}</strong><br>
            ${badges}
        `;

        container.appendChild(div);
    });
}

</script>

{% endblock %}
