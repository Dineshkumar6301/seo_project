{% extends "frontend/base.html" %}
{% block content %}

<style>

body{
    background:#f4f7fb;
    font-family:Inter,sans-serif;
}

.card-soft{
    border:none;
    border-radius:18px;
    background:#fff;
    box-shadow:0 6px 20px rgba(0,0,0,0.06);
    overflow:hidden;
}

.project-item{
    padding:12px 14px;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:8px;
    transition:.2s;
    font-weight:500;
}

.project-item:hover{
    background:#eef4ff;
}

.project-active{
    background:#0d6efd;
    color:#fff;
}

.service-badge{
    display:inline-block;
    padding:8px 14px;
    border-radius:30px;
    background:#eef3ff;
    cursor:pointer;
    margin:4px;
    transition:.2s;
    font-size:14px;
    font-weight:500;
}

.service-badge:hover{
    background:#0d6efd;
    color:#fff;
}

.active-category{
    background:#0d6efd !important;
    color:#fff !important;
}


.task-btn{
    border-radius:10px;
    padding:8px 16px;
    font-weight:500;
}


.form-control{
    border-radius:10px;
    min-height:44px;
}

label{
    font-weight:600;
    margin-bottom:6px;
}

.table-scroll-wrapper{
    width:100%;
    overflow-x:auto;
    border-radius:10px;
    border:1px solid #dee2e6;
}

table{
    min-width:1000px;
    width:100%;
    border-collapse:collapse;
}

.table thead{
    background:#0d6efd;
    color:#fff;
}

.table th,
.table td{
    vertical-align:middle;
    font-size:14px;
    padding:10px 12px;
    border-bottom:1px solid #f0f0f0;
    white-space:nowrap;
}

.table tbody tr:last-child td{
    border-bottom:none;
}

.table tbody tr:hover td{
    background:#f8f9ff;
}

/* URL columns — allow wrap */
.col-url{
    white-space:normal;
    word-break:break-all;
    min-width:200px;
    max-width:260px;
}


.col-trunc{
    max-width:160px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.section-title{
    font-size:17px;
    font-weight:700;
    margin-bottom:14px;
}

.btn{
    border-radius:10px;
    font-weight:600;
}

.empty-box{
    text-align:center;
    padding:40px;
    color:#999;
    font-weight:500;
}

.pagination-btn{
    min-width:40px;
}

.btn-delete{
    padding:4px 10px;
    font-size:13px;
    border-radius:8px;
    color:#dc3545;
    border:1px solid #f5c6cb;
    background:transparent;
    cursor:pointer;
    transition:.2s;
    line-height:1;
}

.btn-delete:hover{
    background:#dc3545;
    color:#fff;
    border-color:#dc3545;
}

</style>

<div class="container-fluid">
<div class="row">

<div class="col-lg-3">

<div class="card card-soft p-3">

<div class="section-title">
Projects
</div>
<div
    class="project-item project-active"
    onclick="clearProject(this)">

    All Projects

</div>

{% for p in projects %}


<div
    class="project-item"
    onclick="selectProject({{p.id}}, this)">

    {{p.name}}

</div>

{% endfor %}

</div>

</div>

<!-- RIGHT -->
<div class="col-lg-9">

<!-- FILTER -->
<div class="card card-soft p-3 mb-3">

<div class="row g-2 align-items-end">

<div class="col-md-3">
<label>Filter</label>

<select
    id="filterType"
    class="form-control"
    onchange="handleFilterChange()">

    <option value="today">Today</option>
    <option value="week">Last Week</option>
    <option value="month">Last Month</option>
    <option value="custom">Custom</option>

</select>
</div>

<div
    class="col-md-2"
    id="startBox"
    style="display:none;">

<label>Start</label>

<input
    type="date"
    id="startDate"
    class="form-control">

</div>

<div
    class="col-md-2"
    id="endBox"
    style="display:none;">

<label>End</label>

<input
    type="date"
    id="endDate"
    class="form-control">

</div>

<div class="col-md-2">

<button
    class="btn btn-primary w-100"
    onclick="loadData()">

    Apply

</button>

</div>

<div class="col-md-2">

<button
    class="btn btn-success w-100"
    onclick="downloadExcel()">

    Excel

</button>

</div>

</div>
</div>

<!-- CATEGORIES -->
<div class="card card-soft p-3 mb-3">

<div class="section-title">
Categories
</div>

<div id="categoriesContainer"></div>

</div>

<!-- SERVICES -->
<div class="card card-soft p-3 mb-3">

<div class="section-title">
Services
</div>

<div id="servicesContainer"></div>

</div>

<!-- TASK -->
<div class="card card-soft p-3 mb-3">

<div class="section-title">
Task Type
</div>

<div id="taskTypes"></div>

</div>

<!-- FORM -->
<div class="card card-soft p-3 mb-3">

<div class="section-title">
Fill Details
</div>

<form id="dynamicForm"></form>

</div>

<!-- TABLE — placed AFTER form -->
<div class="card card-soft p-3 mb-3">

<div class="section-title">
Saved Data
</div>

<div class="table-scroll-wrapper">

<table class="table table-bordered table-hover mb-0">

<thead>
<tr id="tableHead"></tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div
    id="paginationContainer"
    class="d-flex justify-content-center mt-3 flex-wrap gap-1">
</div>

</div>

</div>
</div>
</div>

<script>

/* columns that should display FULL (no truncation) */
const FULL_COLS = ['url', 'submitted_url'];

/* max chars for all other columns */
const TRUNC_LEN = 30;

let fullData = {};

let selectedProject = null;
let selectedCategory = null;
let selectedService = null;
let selectedTask = null;

let currentPage = 1;
const rowsPerPage = 10;

async function selectProject(projectId, el){

    selectedProject = projectId;

    document.querySelectorAll(".project-item")
        .forEach(e => e.classList.remove("project-active"));

    el.classList.add("project-active");

    resetUI();

    try{

        fullData = {};

        let res = await fetch(
            `/activities/api/project-services/${selectedProject}/`
        );

        fullData = await res.json();

        renderCategories(false);

        await loadDataFast();

    }catch(err){

        console.log(err);

        alert("Error loading services");
    }
}

async function clearProject(el){

    selectedProject = null;

    selectedCategory = null;

    selectedService = null;

    selectedTask = null;

    editId = null;

    fullData = {};

    document.querySelectorAll(".project-item")
        .forEach(e => e.classList.remove("project-active"));

    el.classList.add("project-active");

    resetUI();

    await loadDataFast();
}

function resetUI(){

    document.getElementById(
        "categoriesContainer"
    ).innerHTML = "";

    document.getElementById(
        "servicesContainer"
    ).innerHTML = "";

    document.getElementById(
        "taskTypes"
    ).innerHTML = "";

    document.querySelectorAll(
        "#dynamicForm input, #dynamicForm textarea, #dynamicForm select"
    ).forEach(el => {

        if(el.type !== "button"){
            el.value = "";
        }
    });
    selectedCategory = null;
    selectedService = null;
    selectedTask = null;
}



function renderCategories(autoSelect = true){

    let c = document.getElementById(
        "categoriesContainer"
    );

    c.innerHTML = "";

    Object.keys(fullData)
    .sort((a, b) => a.localeCompare(b))
    .forEach(category => {

        c.innerHTML += `
        <span
            class="service-badge category-badge"
            onclick="selectCategory('${category}', this)">

            ${category}

        </span>`;
    });

    if(autoSelect){

        let firstCategory = Object.keys(fullData)[0];

        if(firstCategory){

            selectCategory(
                firstCategory,
                document.querySelector(".category-badge")
            );
        }
    }
}

function selectCategory(category, el){

    selectedCategory = category;

    document.querySelectorAll(".category-badge")
        .forEach(e =>
            e.classList.remove("active-category")
        );

    el.classList.add("active-category");

    let servicesBox = document.getElementById(
        "servicesContainer"
    );

    servicesBox.innerHTML = "";

    let services = fullData[category];

    Object.keys(services)
    .sort((a, b) => a.localeCompare(b))
    .forEach(service => {
    
        servicesBox.innerHTML += `
        <span
            class="service-badge"
            onclick="selectService('${service}')">

            ${service}

        </span>`;
    });

    document.getElementById(
        "taskTypes"
    ).innerHTML = "";

    document.getElementById(
        "dynamicForm"
    ).innerHTML = "";
}

function selectService(service){

    selectedService = service;

    let taskBox = document.getElementById(
        "taskTypes"
    );

    taskBox.innerHTML = "";

    let tasks =
        fullData[selectedCategory][service];

    Object.keys(tasks)
    .sort((a, b) => a.localeCompare(b))
    .forEach(task => {

        taskBox.innerHTML += `
        <button
            type="button"
            class="btn btn-outline-primary m-1 task-btn"
            onclick="selectTask('${task}')">

            ${task}

        </button>`;
    });

    document.getElementById(
        "dynamicForm"
    ).innerHTML = "";
}

function selectTask(task){

    selectedTask = task;

    let form = document.getElementById(
        "dynamicForm"
    );

    form.innerHTML = "";

    let fields =
        fullData[selectedCategory]
                [selectedService]
                [task];

    fields.forEach(field => {

        let input = "";

        /* TEXTAREA */
        if(field.field_type === "textarea"){

            input = `
            <textarea
                class="form-control"
                name="${field.name}">
            </textarea>`;
        }

        /* SELECT */
        else if(field.field_type === "select"){

            input = `
            <select
                class="form-control"
                name="${field.name}">

                ${(field.options || [])
                    .map(o => `
                        <option value="${o}">
                            ${o}
                        </option>
                    `).join("")}

            </select>`;
        }

        /* FILE */
        else if(field.field_type === "file"){

            input = `
            <input
                type="file"
                class="form-control"
                name="${field.name}">
            `;
        }

        /* NORMAL */
        else{

            input = `
            <input
                type="${field.field_type || 'text'}"
                class="form-control"
                name="${field.name}">
            `;
        }

        form.innerHTML += `
        <div class="mb-3">

            <label>
                ${field.label}
            </label>

            ${input}

        </div>`;
    });

    form.innerHTML += `
    <button
        type="button"
        class="btn btn-success w-100"
        onclick="saveData()">

        Save

    </button>`;
}

async function deleteRow(id){

    if(!confirm("Are you sure you want to delete this entry?")){
        return;
    }

    try{

        let res = await fetch(
            `/activities/api/delete/${id}/`,
            {
                method: "DELETE",
                headers: {
                    "X-CSRFToken": getCSRF()
                }
            }
        );

        let result = await res.json();

        if(result.error){
            alert(result.error);
            return;
        }

        await loadDataFast();

    }catch(err){

        console.log(err);
        alert("Delete failed");
    }
}


async function loadData(){

    let url = `/activities/api/list/?`;

    if(selectedProject){
        url += `project=${selectedProject}&`;
    }

    let filterType =
        document.getElementById("filterType").value;

    let startDate =
        document.getElementById("startDate").value;

    let endDate =
        document.getElementById("endDate").value;

    url += `filter=${filterType}&`;
    url += `start=${startDate}&`;
    url += `end=${endDate}`;

    try{

        let res = await fetch(url);
        let data = await res.json();
        renderTable(data);

    }catch(err){

        console.log(err);
        alert("Error loading table");
    }
}


function renderTable(data){

    let head       = document.getElementById("tableHead");
    let body       = document.getElementById("tableBody");
    let pagination = document.getElementById("paginationContainer");

    if(!data.length){

        head.innerHTML = "";

        body.innerHTML = `
        <tr>
            <td colspan="20">
                <div class="empty-box">
                    No activities found
                </div>
            </td>
        </tr>`;

        pagination.innerHTML = "";

        return;
    }

    /* ---- COLLECT DYNAMIC KEYS ---- */
    let dynamicKeys = new Set();

    data.forEach(r => {
        Object.keys(r.data || {})
            .forEach(k => dynamicKeys.add(k));
    });

    dynamicKeys = [...dynamicKeys];

    /* ---- PRIORITY SORT ---- */
    const priority = ["keyword", "url", "submitted_url"];

    dynamicKeys.sort((a, b) => {
        let ai = priority.indexOf(a);
        let bi = priority.indexOf(b);
        ai = ai === -1 ? 999 : ai;
        bi = bi === -1 ? 999 : bi;
        return ai - bi;
    });

    /* ---- TABLE HEAD ---- */
    head.innerHTML = `
        <th>#</th>
        <th>Project</th>
        <th>Category</th>
        <th>Service</th>
        <th>Task</th>
        ${dynamicKeys.map(k =>
            `<th>${formatLabel(k)}</th>`
        ).join("")}
        <th>Action</th>
    `;

    /* ---- PAGINATION SLICE ---- */
    let start         = (currentPage - 1) * rowsPerPage;
    let end           = start + rowsPerPage;
    let paginatedData = data.slice(start, end);

    body.innerHTML = "";

    /* ---- TABLE BODY ---- */
    paginatedData.forEach((r, index) => {

        let cells = dynamicKeys.map(k => {

            let val    = r.data?.[k] || "";
            let isFull = FULL_COLS.includes(k);

            if(typeof val === "string"){

                /* split by comma to support multiple links */
                let parts = val.split(",");

                let rendered = parts.map(part => {

                    part = part.trim();

                    if(
                        part.startsWith("http://") ||
                        part.startsWith("https://")
                    ){
                        /* links always shown full */
                        return `
                        <div class="mb-1">
                            <a href="${part}"
                               target="_blank"
                               title="${part}">
                               ${part}
                            </a>
                        </div>`;
                    }

                    if(isFull){
                        /* non-link full column — show everything */
                        return `<div>${part}</div>`;
                    }

                    /* truncate to TRUNC_LEN characters */
                    let display = part.length > TRUNC_LEN
                        ? part.substring(0, TRUNC_LEN) + "…"
                        : part;

                    return `<div title="${part}">${display}</div>`;

                }).join("");

                let cls = isFull ? "col-url" : "col-trunc";

                return `<td class="${cls}">${rendered}</td>`;
            }

            return `<td>${val}</td>`;

        }).join("");

        body.innerHTML += `
        <tr>
            <td>${start + index + 1}</td>
            <td style="white-space:nowrap;">${r.project_name || ""}</td>
            <td style="white-space:nowrap;">${r.category   || ""}</td>
            <td style="white-space:nowrap;">${r.service_name || r.service || ""}</td>
            <td style="white-space:nowrap;">${r.task_type || r.task || ""}</td>
            ${cells}
            <td>
                <div class="d-flex gap-1">

                    <button
                        class="btn btn-sm btn-primary"
                        onclick="editRow(${r.id})"
                        title="Edit">
                        ✏️
                    </button>

                    <button
                        class="btn-delete"
                        onclick="deleteRow(${r.id})"
                        title="Delete">
                        🗑
                    </button>

                </div>
            </td>
        </tr>`;
    });

    /* ---- PAGINATION BUTTONS ---- */
    let totalPages = Math.ceil(data.length / rowsPerPage);

    pagination.innerHTML = "";

    for(let i = 1; i <= totalPages; i++){

        pagination.innerHTML += `
        <button
            class="btn btn-sm pagination-btn
            ${i === currentPage
                ? 'btn-primary'
                : 'btn-outline-primary'}"

            onclick="changePage(${i})">

            ${i}

        </button>`;
    }
}


function changePage(page){

    currentPage = page;

    loadData();
}

function formatLabel(text){

    return text
        .replaceAll("_", " ")
        .replace(/\b\w/g, l => l.toUpperCase());
}



function handleFilterChange(){

    let type = document.getElementById("filterType").value;

    if(type === "custom"){

        document.getElementById("startBox").style.display = "block";
        document.getElementById("endBox").style.display   = "block";

    }else{

        document.getElementById("startBox").style.display = "none";
        document.getElementById("endBox").style.display   = "none";
    }
}


function downloadExcel(){

    const isAdmin =
        "{{ request.user.is_superuser|yesno:'true,false' }}" === "true"
        ||
        "{{ request.user.is_staff|yesno:'true,false' }}" === "true";

    if(!isAdmin && !selectedProject){

        alert("Please select project first");

        return;
    }

    let filterType =
        document.getElementById("filterType").value;

    let startDate =
        document.getElementById("startDate").value;

    let endDate =
        document.getElementById("endDate").value;

    let url = `/activities/api/export/?type=daily&`;

    if(selectedProject)
        url += `project=${selectedProject}&`;

    if(selectedCategory)
        url += `category=${selectedCategory}&`;

    if(selectedService)
        url += `service=${selectedService}&`;

    if(selectedTask)
        url += `task=${selectedTask}&`;

    url += `filter=${filterType}&`;

    url += `start=${startDate}&`;

    url += `end=${endDate}`;

    window.open(url, "_blank");
}
let editId = null;



async function editRow(id){

    try{

        const response = await fetch(
            `/activities/api/detail/${id}/`
        );

        const data = await response.json();

        console.log("EDIT DATA:", data);

        if(!data.success){

            alert("Activity not found");
            return;
        }

        editId = id;

        currentPage = 1;

        selectedProject  = data.project;
        selectedCategory = data.category;
        selectedService  = data.service_name || data.service;
        selectedTask     = data.task_type || data.task;

        document.querySelectorAll(".project-item")
            .forEach(e => {

                e.classList.remove("project-active");

                if(
                    e.getAttribute("onclick")
                    ?.includes(`(${selectedProject},`)
                ){
                    e.classList.add("project-active");
                }
            });
        const serviceResponse = await fetch(
            `/activities/api/project-services/${selectedProject}/`
        );

        fullData = await serviceResponse.json();
        renderCategories(false);
        const categoryEl =
            [...document.querySelectorAll(".category-badge")]
            .find(el =>
                el.innerText.trim() === selectedCategory
            );

        if(categoryEl){

            selectCategory(
                selectedCategory,
                categoryEl
            );
        }
        selectService(selectedService);
        selectTask(selectedTask);
        await new Promise(resolve =>
            setTimeout(resolve, 50)
        );
        const dynamicData =
            data.dynamic_data || {};

        Object.keys(dynamicData).forEach(key => {

            const field = document.querySelector(
                `[name="${key}"]`
            );

            if(field){

                field.value = dynamicData[key];
            }
        });

        const btn = document.querySelector(
            "#dynamicForm button"
        );

        if(btn){

            btn.innerText = "Update";

            btn.classList.remove("btn-success");

            btn.classList.add("btn-primary");
        }
        document.querySelector(
            ".table-scroll-wrapper"
        ).scrollIntoView({
            behavior: "smooth",
            block: "start"
        });


    }
    catch(error){

        console.log(error);

        alert("Failed to load edit data");
    }
}


async function saveData(){

    if(!selectedProject){
        alert("Select Project");
        return;
    }

    if(!selectedCategory){
        alert("Select Category");
        return;
    }

    if(!selectedService){
        alert("Select Service");
        return;
    }

    if(!selectedTask){
        alert("Select Task");
        return;
    }

    let payload = {

        project: selectedProject,

        category: selectedCategory,

        service_name: selectedService,

        task_type: selectedTask,

        dynamic_data: {}
    };

    let inputs = document.querySelectorAll(
        "#dynamicForm input, #dynamicForm textarea, #dynamicForm select"
    );

    inputs.forEach(i => {

        if(i.type === "file"){

            payload.dynamic_data[i.name] =
                i.files[0]
                ? i.files[0].name
                : "";

        }else{

            payload.dynamic_data[i.name] = i.value;
        }
    });

    try{

        let url = "/activities/api/upsert/";
        let method = "POST";

        if(editId){

            url = `/activities/api/update/${editId}/`;
            method = "PUT";
        }

        const res = await fetch(url, {

            method: method,

            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRF()
            },

            body: JSON.stringify(payload)
        });

        const result = await res.json();

        console.log(result);

        if(result.error){

            alert(result.error);
            return;
        }

        showToast(
            editId
            ? "Updated Successfully"
            : "Saved Successfully"
        );

        editId = null;

        currentPage = 1;

        await loadDataFast();

        document.querySelectorAll(
    "#dynamicForm input, #dynamicForm textarea, #dynamicForm select"
            ).forEach(el => {

                if(el.type !== "button"){
                    el.value = "";
                }
            });
    
        const btn = document.querySelector(
            '#dynamicForm button'
        );

        if(btn){

            btn.innerText = "Save";

            btn.classList.remove("btn-primary");
            btn.classList.add("btn-success");
        }

    }
    catch(err){

        console.log(err);

        alert("Save failed");
    }
}


let cachedTableData = [];

async function loadDataFast(){

    let url = `/activities/api/list/?`;

    if(selectedProject){
        url += `project=${selectedProject}&`;
    }

    let filterType =
        document.getElementById("filterType").value;

    let startDate =
        document.getElementById("startDate").value;

    let endDate =
        document.getElementById("endDate").value;

    url += `filter=${filterType}&`;
    url += `start=${startDate}&`;
    url += `end=${endDate}`;

    try{

        const res = await fetch(url);

        cachedTableData = await res.json();

        renderTable(cachedTableData);

    }catch(err){

        console.log(err);
    }
}
function getCSRF(){

    return document.cookie
        .split('; ')
        .find(r => r.startsWith('csrftoken'))
        ?.split('=')[1];
}

function showToast(message){

    let toast = document.createElement("div");

    toast.innerText = message;

    toast.style.position = "fixed";
    toast.style.top = "20px";
    toast.style.right = "20px";
    toast.style.background = "#198754";
    toast.style.color = "#fff";
    toast.style.padding = "12px 18px";
    toast.style.borderRadius = "10px";
    toast.style.zIndex = "99999";
    toast.style.fontWeight = "600";
    toast.style.boxShadow = "0 6px 20px rgba(0,0,0,.15)";

    document.body.appendChild(toast);

    setTimeout(() => {
        toast.remove();
    }, 2500);
}
</script>

{% endblock %}
