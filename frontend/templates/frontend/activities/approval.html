{% extends "frontend/base.html" %}
{% block content %}

{% load static %}
<!DOCTYPE html>
<html>
<head>
 
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">


<link rel="stylesheet" href="{% static 'css/approval.css' %}">

</head>
<body> 
<div class="dash">

  <div class="dash-header">
    <div class="dash-title">
      Approval Dashboard
    </div>
  </div>


  <div class="filter-group">
    <button class="pill" onclick="setDateFilter(event, 'today')">Today</button>
    <button class="pill" onclick="setDateFilter(event, 'week')">Week</button>
    <button class="pill" onclick="setDateFilter(event, 'month')">Month</button>
    <button class="pill" onclick="setDateFilter(event, 'year')">Year</button>
    <button class="pill" onclick="setDateFilter(event, 'all')">All</button>
  </div>

  <!-- STATUS CARDS -->
  <div class="status-row">
    <div class="stat-card pending {% if current_status == 'pending' %}active-filter{% endif %}" onclick="setStatusFilter('pending')">
      <div class="stat-icon">⏳</div>
      <div class="stat-label">Pending</div>
      <div class="stat-num" id="kpi-pending">{{ pending_count }}</div>
    </div>
    <div class="stat-card approved {% if current_status == 'approved' %}active-filter{% endif %}" onclick="setStatusFilter('approved')">
      <div class="stat-icon">✅</div>
      <div class="stat-label">Approved</div>
      <div class="stat-num" id="kpi-approved">{{ approved_count }}</div>
    </div>
    <div class="stat-card rejected {% if current_status == 'rejected' %}active-filter{% endif %}" onclick="setStatusFilter('rejected')">
      <div class="stat-icon">❌</div>
      <div class="stat-label">Rejected</div>
      <div class="stat-num" id="kpi-rejected">{{ rejected_count }}</div>
    </div>
  </div>

  <div class="toolbar">
    
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search employee / task…" value="{{ search }}">
    </div>

    <select id="projectFilter" class="select-input">
      <option value="">All Projects</option>
      {% for p in projects %}
      <option value="{{p.id}}" {% if selected_project == p.id|stringformat:"s" %}selected{% endif %}>{{ p.name }}</option>
      {% endfor %}
    </select>

    
    <input type="date" id="startDate" class="date-input" placeholder="Start date">
    <input type="date" id="endDate"   class="date-input" placeholder="End date">

    
    <button class="export-btn" onclick="exportExcel()">
      📥 Export Excel
    </button>
  </div>


  <div id="loadingBar" class="table-loading">
    <div class="loading-bar"></div>
  </div>

  <div class="table-card">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Project</th>
            <th>Category</th>
            <th>Service</th>
            <th>Task</th>
            <th>Keyword</th>
            <th>Submitted URL</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="taskTable">
          <tr>
            <td colspan="7" style="text-align:center;padding:40px;color:var(--muted);">
              <span style="font-size:28px;display:block;margin-bottom:8px;opacity:.4;">⏳</span>
              Loading…
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>


  <div class="pagination-wrap" id="pagination"></div>


  <div class="mobile-cards" id="mobileCards">
  </div>

</div>
<script src="{% static 'js/approval.js' %}"></script>
{% endblock %}

</body>
</html>
