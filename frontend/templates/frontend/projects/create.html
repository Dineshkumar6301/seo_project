{% extends "frontend/base.html" %}

{% block content %}
{% load static %}

<div class="container-fluid">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Create Project</h3>
        <a href="{% url 'project_list' %}" class="btn btn-outline-secondary">Project List</a>
    </div>

    <!-- Card -->
    <div class="card shadow-sm border-0">
        <div class="card-body">

            <form method="post">
                {% csrf_token %}

                <div class="row">

                    <!-- Project Name -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Project Name</label>
                        <input name="name" class="form-control" placeholder="Enter project name" required>
                    </div>

                    <!-- Client Selection -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Client</label>
                        <select name="client" class="form-select" required>
                            <option value="">-- Select Client --</option>
                            {% for client in clients %}
                                <option value="{{ client.id }}">
                                    {{ client.name }} | {{ client.company_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    
                    <!-- Start Date -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Start Date</label>
                        <input type="date" name="start_date" class="form-control" required>
                    </div>

                </div>

                <!-- Submit -->
                <div class="mt-3">
                    <button class="btn btn-success px-4">Create Project</button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
